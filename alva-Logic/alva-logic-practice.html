<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alva Logic Practice</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0e;
    --surface: #161616;
    --border: #2a2a2a;
    --text: #e8e8e8;
    --muted: #666;
    --accent: #7eeae4;
    --correct: #4ade80;
    --wrong: #f87171;
    --warn: #fbbf24;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 4rem;
  }

  header {
    width: 100%;
    max-width: 720px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 2.5rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    color: var(--accent);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .progress-info {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
  }

  .progress-bar {
    width: 100%;
    max-width: 720px;
    height: 2px;
    background: var(--border);
    margin-bottom: 2rem;
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.4s ease;
  }

  .question-card {
    width: 100%;
    max-width: 720px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2rem;
    margin-bottom: 1.5rem;
  }

  .question-meta {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 1rem;
  }

  .question-title {
    font-size: 0.9rem;
    font-weight: 300;
    color: var(--muted);
    margin-bottom: 1.5rem;
    line-height: 1.6;
  }

  /* Matrix Grid */
  .matrix-container {
    display: flex;
    justify-content: center;
    margin: 1.5rem 0;
  }

  .matrix {
    display: grid;
    grid-template-columns: repeat(3, 90px);
    grid-template-rows: repeat(3, 90px);
    gap: 6px;
  }

  .cell {
    width: 90px;
    height: 90px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .cell.missing {
    border: 1.5px dashed var(--accent);
    background: rgba(126, 234, 228, 0.03);
  }

  .cell svg {
    width: 64px;
    height: 64px;
  }

  /* Answer Options */
  .options-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 1rem;
  }

  .options-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 1.5rem;
  }

  .option-btn {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 0.75rem 0.5rem;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
    transition: border-color 0.15s, background 0.15s;
    position: relative;
  }

  .option-btn:hover:not(:disabled) {
    border-color: var(--accent);
    background: rgba(126, 234, 228, 0.04);
  }

  .option-btn.selected {
    border-color: var(--accent);
    background: rgba(126, 234, 228, 0.08);
  }

  .option-btn.correct {
    border-color: var(--correct);
    background: rgba(74, 222, 128, 0.08);
  }

  .option-btn.wrong {
    border-color: var(--wrong);
    background: rgba(248, 113, 113, 0.08);
  }

  .option-btn svg {
    width: 52px;
    height: 52px;
  }

  .option-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  /* Explanation */
  .explanation {
    background: var(--bg);
    border-left: 2px solid var(--accent);
    border-radius: 0 3px 3px 0;
    padding: 1rem 1.25rem;
    margin-top: 1.25rem;
    display: none;
  }

  .explanation.visible { display: block; }

  .explanation-header {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 0.5rem;
  }

  .explanation-header.correct { color: var(--correct); }
  .explanation-header.wrong { color: var(--wrong); }

  .explanation p {
    font-size: 0.85rem;
    color: #b0b0b0;
    line-height: 1.7;
  }

  .explanation .rule {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    color: var(--accent);
    margin-top: 0.5rem;
    padding: 0.5rem 0.75rem;
    background: rgba(126, 234, 228, 0.05);
    border-radius: 2px;
  }

  /* Timer */
  .timer-bar {
    width: 100%;
    max-width: 720px;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-bottom: 1.5rem;
    overflow: hidden;
  }

  .timer-fill {
    height: 100%;
    background: var(--accent);
    transition: width 1s linear, background 0.3s;
    width: 100%;
  }

  .timer-fill.urgent { background: var(--wrong); }

  .timer-text {
    width: 100%;
    max-width: 720px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    margin-bottom: 0.5rem;
    text-align: right;
  }

  /* Buttons */
  .btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.65rem 1.5rem;
    border-radius: 2px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.15s;
    background: transparent;
    color: var(--text);
  }

  .btn-primary {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
  }

  .btn-primary:hover { opacity: 0.85; }
  .btn:hover:not(.btn-primary) { border-color: var(--accent); color: var(--accent); }

  .actions {
    width: 100%;
    max-width: 720px;
    display: flex;
    justify-content: flex-end;
    gap: 0.75rem;
  }

  /* Score screen */
  .score-screen {
    width: 100%;
    max-width: 720px;
    text-align: center;
    display: none;
  }

  .score-screen.visible { display: block; }

  .score-big {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 5rem;
    color: var(--accent);
    line-height: 1;
    margin: 2rem 0 0.5rem;
  }

  .score-label {
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 2rem;
  }

  .score-breakdown {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1.5rem;
    margin-bottom: 2rem;
    text-align: left;
  }

  .score-row {
    display: flex;
    justify-content: space-between;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    padding: 0.4rem 0;
    border-bottom: 1px solid var(--border);
    color: var(--muted);
  }

  .score-row:last-child { border-bottom: none; }
  .score-row span:last-child { color: var(--text); }

  .question-wrapper { display: block; }
  .question-wrapper.hidden { display: none; }
</style>
</head>
<body>

<header>
  <div class="logo">Alva Logic Practice</div>
  <div class="progress-info" id="progressInfo">Question 1 of 8</div>
</header>

<div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>

<div class="timer-text" id="timerText">2:00 remaining</div>
<div class="timer-bar"><div class="timer-fill" id="timerFill"></div></div>

<div class="question-wrapper" id="questionWrapper">
  <div class="question-card">
    <div class="question-meta" id="questionMeta">Pattern Recognition · Q1</div>
    <div class="question-title">Which shape correctly completes the matrix? The bottom-right cell is missing.</div>
    <div class="matrix-container">
      <div class="matrix" id="matrixGrid"></div>
    </div>
    <div class="options-label">Select the correct answer</div>
    <div class="options-grid" id="optionsGrid"></div>
    <div class="explanation" id="explanation">
      <div class="explanation-header" id="explanationHeader"></div>
      <p id="explanationText"></p>
      <div class="rule" id="explanationRule"></div>
    </div>
  </div>
  <div class="actions">
    <button class="btn" id="skipBtn" onclick="skipQuestion()">Skip</button>
    <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()" style="display:none">Next →</button>
  </div>
</div>

<div class="score-screen" id="scoreScreen">
  <div class="logo" style="margin-bottom:1rem">Practice Complete</div>
  <div class="score-big" id="scoreBig">—</div>
  <div class="score-label" id="scoreLabel">questions answered correctly</div>
  <div class="score-breakdown" id="scoreBreakdown"></div>
  <button class="btn btn-primary" onclick="restartQuiz()">Restart Practice</button>
</div>

<script>
// ─── SVG Shape Helpers ───────────────────────────────────────────────────────

function circle(fill='none', stroke='#7eeae4', r=22, cx=32, cy=32) {
  return `<svg viewBox="0 0 64 64"><circle cx="${cx}" cy="${cy}" r="${r}" fill="${fill}" stroke="${stroke}" stroke-width="2.5"/></svg>`;
}
function square(fill='none', stroke='#7eeae4', size=42, x=11, y=11) {
  return `<svg viewBox="0 0 64 64"><rect x="${x}" y="${y}" width="${size}" height="${size}" fill="${fill}" stroke="${stroke}" stroke-width="2.5"/></svg>`;
}
function triangle(fill='none', stroke='#7eeae4') {
  return `<svg viewBox="0 0 64 64"><polygon points="32,8 58,56 6,56" fill="${fill}" stroke="${stroke}" stroke-width="2.5"/></svg>`;
}
function diamond(fill='none', stroke='#7eeae4') {
  return `<svg viewBox="0 0 64 64"><polygon points="32,6 58,32 32,58 6,32" fill="${fill}" stroke="${stroke}" stroke-width="2.5"/></svg>`;
}
function cross(stroke='#7eeae4') {
  return `<svg viewBox="0 0 64 64"><line x1="32" y1="8" x2="32" y2="56" stroke="${stroke}" stroke-width="2.5"/><line x1="8" y1="32" x2="56" y2="32" stroke="${stroke}" stroke-width="2.5"/></svg>`;
}
function dots(n, fill='#7eeae4') {
  const positions = [[20,20],[44,20],[20,44],[44,44],[32,32],[20,32],[44,32],[32,20],[32,44]];
  const pts = positions.slice(0,n).map(([x,y])=>`<circle cx="${x}" cy="${y}" r="6" fill="${fill}"/>`).join('');
  return `<svg viewBox="0 0 64 64">${pts}</svg>`;
}
function lines(n, stroke='#7eeae4') {
  const ys = [16,26,36,46,56];
  const ls = ys.slice(0,n).map(y=>`<line x1="8" y1="${y}" x2="56" y2="${y}" stroke="${stroke}" stroke-width="2.5"/>`).join('');
  return `<svg viewBox="0 0 64 64">${ls}</svg>`;
}
function circleWithDot(fill='none', stroke='#7eeae4') {
  return `<svg viewBox="0 0 64 64"><circle cx="32" cy="32" r="22" fill="${fill}" stroke="${stroke}" stroke-width="2.5"/><circle cx="32" cy="32" r="6" fill="${stroke}"/></svg>`;
}
function emptyCell() {
  return `<svg viewBox="0 0 64 64"></svg>`;
}
function rotatedSquare(deg, fill='none', stroke='#7eeae4') {
  return `<svg viewBox="0 0 64 64"><rect x="16" y="16" width="32" height="32" fill="${fill}" stroke="${stroke}" stroke-width="2.5" transform="rotate(${deg},32,32)"/></svg>`;
}
function pentagon(fill='none', stroke='#7eeae4') {
  return `<svg viewBox="0 0 64 64"><polygon points="32,6 57,24 48,54 16,54 7,24" fill="${fill}" stroke="${stroke}" stroke-width="2.5"/></svg>`;
}
function hexagon(fill='none', stroke='#7eeae4') {
  return `<svg viewBox="0 0 64 64"><polygon points="32,6 56,19 56,45 32,58 8,45 8,19" fill="${fill}" stroke="${stroke}" stroke-width="2.5"/></svg>`;
}
function smallShape(shape, fill='none', stroke='#7eeae4') {
  if(shape==='circle') return `<svg viewBox="0 0 64 64"><circle cx="32" cy="32" r="14" fill="${fill}" stroke="${stroke}" stroke-width="2.5"/></svg>`;
  if(shape==='square') return `<svg viewBox="0 0 64 64"><rect x="18" y="18" width="28" height="28" fill="${fill}" stroke="${stroke}" stroke-width="2.5"/></svg>`;
  if(shape==='triangle') return `<svg viewBox="0 0 64 64"><polygon points="32,18 50,50 14,50" fill="${fill}" stroke="${stroke}" stroke-width="2.5"/></svg>`;
  return emptyCell();
}

// ─── Questions ───────────────────────────────────────────────────────────────
// Each question: grid (9 cells, index 8 = missing), options (A-D), answer, explanation

const questions = [
  {
    meta: 'Counting Pattern · Easy',
    grid: [
      dots(1), dots(2), dots(3),
      dots(2), dots(3), dots(4),
      dots(3), dots(4), null
    ],
    options: [dots(5), dots(4), dots(6), dots(3)],
    labels: ['A','B','C','D'],
    answer: 1, // B = dots(4) — wait, actually answer is dots(5)
    // let me recalculate: row3 is 3,4,? → 5. So answer=0
    explanation: 'Each row increases by 1 dot left to right. Each column also increases by 1 dot top to bottom. Row 3: 3→4→5. The missing cell needs 5 dots.',
    rule: 'Rule: +1 dot per step, both horizontally and vertically'
  },
  {
    meta: 'Shape Fill · Easy',
    grid: [
      circle('none'), circle('#7eeae4'), circle('none'),
      circle('#7eeae4'), circle('none'), circle('#7eeae4'),
      circle('none'), circle('#7eeae4'), null
    ],
    options: [circle('#7eeae4'), circle('none'), square('none'), dots(1)],
    labels: ['A','B','C','D'],
    answer: 0,
    explanation: 'The fill alternates: empty → filled → empty across each row. Row 3: empty → filled → empty. The missing cell is filled.',
    rule: 'Rule: Alternating fill pattern (empty / filled) across rows and columns'
  },
  {
    meta: 'Size Progression · Easy',
    grid: [
      circle('none','#7eeae4',10), circle('none','#7eeae4',17), circle('none','#7eeae4',24),
      circle('none','#7eeae4',17), circle('none','#7eeae4',24), circle('none','#7eeae4',31),
      circle('none','#7eeae4',24), circle('none','#7eeae4',31), null
    ],
    options: [circle('none','#7eeae4',24), circle('none','#7eeae4',10), circle('none','#7eeae4',38), circle('none','#7eeae4',31)],
    labels: ['A','B','C','D'],
    answer: 2,
    explanation: 'Circles grow larger left to right (+7px radius per step). Row 3 starts at size 24, then 31, so the missing cell is 38 — the largest circle.',
    rule: 'Rule: Consistent size increase (+7 units) across each row'
  },
  {
    meta: 'Shape Rotation · Medium',
    grid: [
      rotatedSquare(0), rotatedSquare(15), rotatedSquare(30),
      rotatedSquare(15), rotatedSquare(30), rotatedSquare(45),
      rotatedSquare(30), rotatedSquare(45), null
    ],
    options: [rotatedSquare(30), rotatedSquare(45), rotatedSquare(60), rotatedSquare(15)],
    labels: ['A','B','C','D'],
    answer: 2,
    explanation: 'Each square rotates +15° per step. Row 3: 30°→45°→60°. The missing shape is rotated 60 degrees.',
    rule: 'Rule: +15° rotation per step horizontally; diagonal confirms the pattern'
  },
  {
    meta: 'Line Count · Medium',
    grid: [
      lines(1), lines(2), lines(3),
      lines(3), lines(2), lines(1),
      lines(2), lines(3), null
    ],
    options: [lines(3), lines(1), lines(2), lines(4)],
    labels: ['A','B','C','D'],
    answer: 2,
    explanation: 'Row 1: 1,2,3 (ascending). Row 2: 3,2,1 (descending). Row 3 follows ascending from 2: 2,3,? — but the column pattern shows column 3 is: 3,1,? The missing value completes column 3 to average 2. Answer: 2 lines.',
    rule: 'Rule: Each column sums to 6. Column 3: 3+1+? = 6, so ? = 2'
  },
  {
    meta: 'Shape Substitution · Medium',
    grid: [
      circle('none'), square('none'), triangle('none'),
      square('none'), triangle('none'), circle('none'),
      triangle('none'), circle('none'), null
    ],
    options: [triangle('none'), circle('none'), diamond('none'), square('none')],
    labels: ['A','B','C','D'],
    answer: 3,
    explanation: 'Each row is a cyclic rotation of [circle, square, triangle]. Row 3 starts with triangle, then circle — so the missing shape is square.',
    rule: 'Rule: Each shape appears exactly once per row and once per column (Latin square)'
  },
  {
    meta: 'Fill & Shape Combined · Hard',
    grid: [
      circle('none'), circle('#7eeae4'), square('none'),
      circle('#7eeae4'), square('none'), square('#7eeae4'),
      square('none'), square('#7eeae4'), null
    ],
    options: [circle('none'), circle('#7eeae4'), square('none'), triangle('none')],
    labels: ['A','B','C','D'],
    answer: 0,
    explanation: 'The shape shifts from circle to square diagonally. The fill alternates empty/filled per step. The bottom-right should be a circle (shape pattern) with no fill (fill pattern: empty).',
    rule: 'Rule: Shape cycles circle→square diagonally; fill alternates empty/filled'
  },
  {
    meta: 'Inner & Outer · Hard',
    grid: [
      circleWithDot('none'), circle('none'), circleWithDot('#7eeae4'),
      circle('none'), circleWithDot('#7eeae4'), circle('#7eeae4'),
      circleWithDot('#7eeae4'), circle('#7eeae4'), null
    ],
    options: [circleWithDot('none'), circle('#7eeae4'), circleWithDot('#7eeae4'), circle('none')],
    labels: ['A','B','C','D'],
    answer: 0,
    explanation: 'Two elements alternate: presence of inner dot, and fill state. Diagonals confirm: top-left to bottom-right shows circleWithDot(empty)→circleWithDot(filled)→? The missing cell has the dot but no fill.',
    rule: 'Rule: Dot presence and fill are independent alternating variables'
  }
];

// Fix answer for Q1 (dots)
questions[0].answer = 0; // dots(5) is index 0

// ─── State ───────────────────────────────────────────────────────────────────
let current = 0;
let score = 0;
let answered = false;
let results = [];
let timer = null;
let timeLeft = 120;

// ─── Render ──────────────────────────────────────────────────────────────────
function renderQuestion() {
  const q = questions[current];
  answered = false;

  document.getElementById('progressInfo').textContent = `Question ${current+1} of ${questions.length}`;
  document.getElementById('progressFill').style.width = `${(current/questions.length)*100}%`;
  document.getElementById('questionMeta').textContent = q.meta;
  document.getElementById('explanation').classList.remove('visible');
  document.getElementById('nextBtn').style.display = 'none';
  document.getElementById('skipBtn').style.display = 'inline-block';

  // Matrix
  const grid = document.getElementById('matrixGrid');
  grid.innerHTML = '';
  q.grid.forEach((cell, i) => {
    const div = document.createElement('div');
    div.className = 'cell' + (cell === null ? ' missing' : '');
    div.innerHTML = cell === null ? `<svg viewBox="0 0 64 64"><text x="32" y="37" text-anchor="middle" fill="#7eeae4" font-size="20" font-family="monospace">?</text></svg>` : cell;
    grid.appendChild(div);
  });

  // Options
  const opts = document.getElementById('optionsGrid');
  opts.innerHTML = '';
  q.options.forEach((svg, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `${svg}<span class="option-label">${q.labels[i]}</span>`;
    btn.onclick = () => selectAnswer(i, btn);
    opts.appendChild(btn);
  });

  startTimer();
}

function selectAnswer(i, btn) {
  if (answered) return;
  answered = true;
  clearInterval(timer);

  const q = questions[current];
  const allBtns = document.querySelectorAll('.option-btn');
  allBtns.forEach(b => b.disabled = true);

  const correct = i === q.answer;
  if (correct) score++;
  results.push({ q: current+1, correct, meta: q.meta });

  btn.classList.add(correct ? 'correct' : 'wrong');
  allBtns[q.answer].classList.add('correct');

  const expHeader = document.getElementById('explanationHeader');
  expHeader.textContent = correct ? '✓ Correct' : `✗ Wrong — Answer was ${q.labels[q.answer]}`;
  expHeader.className = 'explanation-header ' + (correct ? 'correct' : 'wrong');
  document.getElementById('explanationText').textContent = q.explanation;
  document.getElementById('explanationRule').textContent = q.rule;
  document.getElementById('explanation').classList.add('visible');

  document.getElementById('nextBtn').style.display = 'inline-block';
  document.getElementById('skipBtn').style.display = 'none';
}

function skipQuestion() {
  if (answered) return;
  answered = true;
  clearInterval(timer);
  const q = questions[current];
  results.push({ q: current+1, correct: false, meta: q.meta, skipped: true });

  const allBtns = document.querySelectorAll('.option-btn');
  allBtns.forEach(b => b.disabled = true);
  allBtns[q.answer].classList.add('correct');

  const expHeader = document.getElementById('explanationHeader');
  expHeader.textContent = `— Skipped — Answer was ${q.labels[q.answer]}`;
  expHeader.className = 'explanation-header wrong';
  document.getElementById('explanationText').textContent = q.explanation;
  document.getElementById('explanationRule').textContent = q.rule;
  document.getElementById('explanation').classList.add('visible');

  document.getElementById('nextBtn').style.display = 'inline-block';
  document.getElementById('skipBtn').style.display = 'none';
}

function nextQuestion() {
  current++;
  if (current >= questions.length) {
    showScore();
  } else {
    renderQuestion();
  }
}

function startTimer() {
  timeLeft = 120;
  clearInterval(timer);
  updateTimerDisplay();
  timer = setInterval(() => {
    timeLeft--;
    updateTimerDisplay();
    if (timeLeft <= 0) {
      clearInterval(timer);
      if (!answered) skipQuestion();
    }
  }, 1000);
}

function updateTimerDisplay() {
  const m = Math.floor(timeLeft/60);
  const s = timeLeft % 60;
  document.getElementById('timerText').textContent = `${m}:${s.toString().padStart(2,'0')} remaining`;
  const pct = (timeLeft/120)*100;
  const fill = document.getElementById('timerFill');
  fill.style.width = pct + '%';
  fill.classList.toggle('urgent', timeLeft <= 30);
}

function showScore() {
  clearInterval(timer);
  document.getElementById('questionWrapper').classList.add('hidden');
  document.getElementById('scoreScreen').classList.add('visible');
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('timerText').textContent = '';
  document.getElementById('timerFill').style.width = '0%';

  const pct = Math.round((score/questions.length)*100);
  document.getElementById('scoreBig').textContent = `${score}/${questions.length}`;
  document.getElementById('scoreLabel').textContent = `${pct}% correct — ${getRating(pct)}`;

  const breakdown = document.getElementById('scoreBreakdown');
  breakdown.innerHTML = results.map(r => `
    <div class="score-row">
      <span>Q${r.q} · ${r.meta}</span>
      <span style="color:${r.correct ? 'var(--correct)' : 'var(--wrong)'}">${r.skipped ? 'Skipped' : r.correct ? 'Correct' : 'Wrong'}</span>
    </div>
  `).join('');
}

function getRating(pct) {
  if (pct >= 88) return 'Excellent — above average candidate range';
  if (pct >= 63) return 'Good — within competitive range';
  if (pct >= 38) return 'Developing — more pattern practice recommended';
  return 'Keep practising — focus on rule identification speed';
}

function restartQuiz() {
  current = 0; score = 0; answered = false; results = [];
  document.getElementById('questionWrapper').classList.remove('hidden');
  document.getElementById('scoreScreen').classList.remove('visible');
  renderQuestion();
}

// Init
renderQuestion();
</script>
</body>
</html>
