name = "job-tracker-browser-worker"
main = "index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[[browser]]
binding = "BROWSER"

# Deploy with:
#   cd src/workers/browser-worker
#   npx wrangler deploy
#
# Then set the secret:
#   npx wrangler secret put WORKER_SECRET
#
# Copy the deployed URL into job-tracker/.env.local:
#   VITE_BROWSER_WORKER_URL=https://job-tracker-browser-worker.<your-subdomain>.workers.dev
#   VITE_BROWSER_WORKER_SECRET=<same value you set above>
